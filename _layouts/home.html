<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ site.name }} — {{ site.description }}</title>
  {% include meta.html %}
  <link rel="stylesheet" href="{{ site.baseurl }}/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="alternate" type="application/rss+xml" title="{{ site.name }}" href="{{ site.baseurl }}/feed.xml">
</head>
<body class="home-page">

  <nav class="resume-nav">
    <div class="resume-nav__inner">
      <a class="resume-nav__logo" href="/">NK</a>
      <ul class="resume-nav__links">
        <li><a href="#about">About</a></li>
        <li><a href="#experience">Experience</a></li>
        <li><a href="#skills">Skills</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </div>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer class="resume-footer">
    <div class="resume-container">
      <div class="resume-footer__icons">
        {% include svg-icons.html %}
      </div>
      <p class="resume-footer__copy">{{ site.name }}</p>
    </div>
  </footer>

  {% include analytics.html %}
</body>
</html>
